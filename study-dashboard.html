function renderRoadmap() {
  const el = document.getElementById('roadmapList');
  let totalDone = 0, totalAll = 0;
  el.innerHTML = ROADMAP.map(stage => {
    const topicsDone = stage.topics.filter(t => roadmapProgress[t.id]?.completed).length;
    const pct = Math.round(topicsDone / stage.topics.length * 100);
    totalDone += topicsDone; totalAll += stage.topics.length;
    const numClass = pct === 100 ? 'done' : stage.stage === 3 ? 'future' : '';
    return `
    <div class="stage-card">
      <div class="stage-header">
        <div class="stage-num ${numClass}">${stage.stage}</div>
        <div class="stage-info">
          <div class="stage-name">${stage.title}</div>
          <div class="stage-period">?뱟 ${stage.period}</div>
          <div class="progress-wrap" style="width:180px; margin-top:6px;">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="stage-pct">${topicsDone}/${stage.topics.length}</div>
      </div>
      <div class="stage-body">
        ${stage.topics.map(t => {
          const done = roadmapProgress[t.id]?.completed;
          return `
          <div class="topic-row ${done ? 'topic-done' : ''}">
            <input type="checkbox" class="topic-check" ${done ? 'checked' : ''} onchange="toggleTopic('${t.id}', this.checked)" />
            <div class="topic-info">
              <div class="topic-name">${t.name}</div>
              <div class="topic-desc">${t.desc}</div>
            </div>
            <span class="badge badge-${t.cat.toLowerCase()}">${t.cat}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  const total = Math.round(totalDone / totalAll * 100);
  document.getElementById('totalPct').textContent = total + '%';
}

function startLocalQuiz() {
  const cat = document.getElementById('quizCategory').value;
  const count = parseInt(document.getElementById('quizCount').value);
  let bank = cat === '?꾩껜' ? Object.values(LOCAL_QUIZ_BANK).flat() : (LOCAL_QUIZ_BANK[cat] || LOCAL_QUIZ_BANK['Git']);
  const shuffled = bank.sort(() => Math.random() - 0.5).slice(0, Math.min(count, bank.length));
  startQuizWithData(shuffled);
}

function startQuizWithData(questions) {
  quizData = questions; currentQuizQ = 0; quizScore = 0;
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  if (currentQuizQ >= quizData.length) { renderQuizResult(); return; }
  quizAnswered = false;
  const q = quizData[currentQuizQ];
  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-box">
      <div class="quiz-progress">${currentQuizQ + 1} / ${quizData.length} 쨌 ?먯닔 ${quizScore}??/div>
      <div class="quiz-q" style="margin-top:10px;">${escHtml(q.q || q.question || '')}</div>
      <div class="quiz-options">
        ${(q.opts || q.options || []).map((opt, i) => `
          <button class="quiz-opt" onclick="selectQuizOpt(${i})">${String.fromCharCode(65+i)}. ${escHtml(opt)}</button>
        `).join('')}
      </div>
      <div id="quizExplain" style="display:none;"></div>
      <div class="quiz-nav">
        <span></span>
        <button class="btn btn-outline btn-sm" id="quizNextBtn" style="display:none;" onclick="nextQuestion()">?ㅼ쓬 ??/button>
      </div>
    </div>`;
}

function selectQuizOpt(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizData[currentQuizQ];
  const ans = q.ans !== undefined ? q.ans : q.answer;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((btn, idx) => {
    btn.classList.add('revealed');
    if (idx === ans) btn.classList.add('correct');
    else if (idx === i && i !== ans) btn.classList.add('wrong');
  });
  if (i === ans) quizScore++;
  const explain = document.getElementById('quizExplain');
  explain.style.display = 'block';
  explain.innerHTML = `<div class="quiz-explain">${i === ans ? '???뺣떟!' : `???ㅻ떟 (?뺣떟: ${String.fromCharCode(65+ans)})`}<br><br>${escHtml(q.exp || q.explanation || '')}</div>`;
  document.getElementById('quizNextBtn').style.display = 'inline-flex';
}

function nextQuestion() { currentQuizQ++; renderQuizQuestion(); }

function renderQuizResult() {
  const total = quizData.length;

        <button class="btn btn-primary" onclick="startLocalQuiz()">?봽 ?ㅼ떆 ?湲?/button>
        <button class="btn btn-outline" onclick="cancelQuiz()">???ㅼ젙?쇰줈</button>

  _db.ref(FB.quiz_res + '/local_' + Date.now()).set({ score: quizScore, total, pct, date: today() }).catch(()=>{});
}

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d.includes('T') ? d : d + 'T00:00:00');
  return date.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
