function renderRoadmap() {
  const el = document.getElementById('roadmapList');
  let totalDone = 0, totalAll = 0;
  el.innerHTML = ROADMAP.map(stage => {
    const topicsDone = stage.topics.filter(t => roadmapProgress[t.id]?.completed).length;
    const pct = Math.round(topicsDone / stage.topics.length * 100);
    totalDone += topicsDone; totalAll += stage.topics.length;
    const numClass = pct === 100 ? 'done' : stage.stage === 3 ? 'future' : '';
    return `
    <div class="stage-card">
      <div class="stage-header">
        <div class="stage-num ${numClass}">${stage.stage}</div>
        <div class="stage-info">
          <div class="stage-name">${stage.title}</div>
          <div class="stage-period">?лұҹ ${stage.period}</div>
          <div class="progress-wrap" style="width:180px; margin-top:6px;">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="stage-pct">${topicsDone}/${stage.topics.length}</div>
      </div>
      <div class="stage-body">
        ${stage.topics.map(t => {
          const done = roadmapProgress[t.id]?.completed;
          return `
          <div class="topic-row ${done ? 'topic-done' : ''}">
            <input type="checkbox" class="topic-check" ${done ? 'checked' : ''} onchange="toggleTopic('${t.id}', this.checked)" />
            <div class="topic-info">
              <div class="topic-name">${t.name}</div>
              <div class="topic-desc">${t.desc}</div>
            </div>
            <span class="badge badge-${t.cat.toLowerCase()}">${t.cat}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  const total = Math.round(totalDone / totalAll * 100);
  document.getElementById('totalPct').textContent = total + '%';
}

function toggleTopic(id, checked) {
  _db.ref(FB.roadmap + '/' + id).set(checked ? { completed: true, completedAt: today() } : null)
    .then(() => showToast(checked ? '???кҫЁмҰә п§Јм„Һв”Ғ!' : '?в‘јнҲҳ з—Қв‘Ҙлғј??, checked ? 'success' : 'info'))
    .catch(() => showToast('?ВҖ???г…ҪлҷЈ', 'error'));
}

function saveJournal() {
  const content = document.getElementById('journalContent').value.trim();
  if (!content) { showToast('?лҢҒмҠң???лӮ…м °?лҢҒпјң?лӘ„мҠӮ', 'error'); return; }

  const data = { content, duration, mood: selectedMood, saved: Date.now() };

  if (editJournalId) {
    // ?м„Ҹм ҷ п§Ҹв‘Өлұ¶ ??ж№Ікі—гҖҲ ??гҒү ??лјұ?кіҢлҰ°

      }).catch(() => showToast('?ВҖ???г…ҪлҷЈ', 'error'));

    // ?мўүнҮӢ ??push()жҝЎ?еӘӣмҲҲ? ???Сүмңӯ еӘӣ??ВҖ??еӘӣВҖ??

}

function selectMoodByValue(mood) {
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.mood === mood);
  });
  selectedMood = mood;
}

function renderJournals() {
  const el = document.getElementById('journalList');
  const dates = Object.keys(journals).sort((a,b) => b.localeCompare(a));
  if (!dates.length) { el.innerHTML = '<div class="empty"><div class="icon">?лұӯ</div>?кҫ©мӯ… ?мҲҲл’ҝ?мҮұ?еӘӣВҖ ?лҶҒлјұ??<br>?г…»л’ӣ??и«ӣкі—???ж№Ікі•мӨү?лҢҖлӮ«?лӘ„мҠӮ!</div>'; return; }
  el.innerHTML = dates.map(date => {
    const dayEntries = journals[date];
    // push() жҸҙСҠвҖң {id:{...}} vs жҸҙСӢмӮҺ set() жҸҙСҠвҖң {content:...} ?лӘ…мҶҡ п§Јм„Һв”Ғ
    const items = (dayEntries && typeof dayEntries.content === 'string')
      ? [{ _id: '_legacy', ...dayEntries }]
      : Object.entries(dayEntries || {})
          .map(([id, d]) => ({ _id: id, ...d }))
          .sort((a,b) => (a.saved||0) - (b.saved||0));
    return items.map((d, i) => `
    <div class="journal-item" style="position:relative;">
      <div class="journal-meta">
        <span class="journal-date">${formatDate(date)}${items.length > 1 ? ` мЁҢ ${i+1}иё°лҚүгҺҸ` : ''}</span>
        ${d.duration ? `<span class="journal-duration">?к№ҚнҲҳ ${d.duration}йҒә?/span>` : ''}
        ${d.mood ? `<span style="font-size:18px;">${d.mood}</span>` : ''}
        <div style="margin-left:auto;display:flex;gap:4px;">
          ${d._id !== '_legacy' ? `<button class="btn-ghost btn-sm" onclick="editJournal('${date}','${d._id}',journals['${date}']['${d._id}'])">?лҘ…нҲҳ</button>` : ''}
          ${d._id !== '_legacy' ? `<button class="btn-ghost btn-sm" style="color:var(--red);" onclick="deleteJournal('${date}','${d._id}')">?лҝҠжҲӘ?/button>` : ''}
        </div>
      </div>
      <div class="journal-content">${escHtml(d.content)}</div>
    </div>`).join('');
  }).join('');
}

function startQuiz() {
  const cat = document.getElementById('quizCategory').value;
  const count = parseInt(document.getElementById('quizCount').value);
  const diff = document.getElementById('quizDifficulty').value;
  const reqId = 'q_' + Date.now();
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-box" style="text-align:center;">
      <div class="loading-spin"></div>
      <p style="color:var(--text2);font-size:13px;">Claude AIеӘӣВҖ <b>${cat}</b> ${diff} иҮҫлӘ„м Ј ${count}еӘӣм’•? ?м•№кҪҰ?м„Һл’— д»Ҙ?..</p>
      <p style="color:var(--text3);font-size:12px;margin-top:8px;">?кі—л’Ә?СӢк№ҷ ?кі•гҒҢ???кіҢк»җ?м„Ҹлјұ ?лҚүлјұ???лҢҒмҠӮ.</p>
      <button class="btn btn-outline btn-sm" onclick="cancelQuiz()" style="margin-top:16px;">з—Қв‘Ҙлғј</button>
    </div>`;
  _db.ref(FB.quiz_req + '/' + reqId).set({ category: cat, count, difficulty: diff, created: Date.now() });
  const listener = _db.ref(FB.quiz_res + '/' + reqId).on('value', snap => {
    if (!snap.val()) return;
    _db.ref(FB.quiz_res + '/' + reqId).off('value', listener);
    const result = snap.val();
    if (result.error) { showToast('?лҢҒм«° ?м•№кҪҰ ?г…ҪлҷЈ: ' + result.error, 'error'); cancelQuiz(); return; }
    startQuizWithData(result.questions || []);
  });
  setTimeout(() => {
    _db.ref(FB.quiz_res + '/' + reqId).off('value', listener);
    if (quizData) return;
    showToast('?ВҖ?кҫ©лёҳ?????кі•гҒҢ???кіҢк»җ?м„Ҹ? ?л”ҶлёҜ?лҢҒмҠӮ. ?г…ҪлҙҪ?мҮұм”Ө ?лҢҒм«°жҝЎ??кҫӘмҶҡ?в‘ёл•І??', 'error');
    startLocalQuiz();
  }, 30000);
}

function startLocalQuiz() {
  const cat = document.getElementById('quizCategory').value;
  const count = parseInt(document.getElementById('quizCount').value);
  let bank = cat === '?кҫ©к»ң' ? Object.values(LOCAL_QUIZ_BANK).flat() : (LOCAL_QUIZ_BANK[cat] || LOCAL_QUIZ_BANK['Git']);
  const shuffled = bank.sort(() => Math.random() - 0.5).slice(0, Math.min(count, bank.length));
  startQuizWithData(shuffled);
}

function startQuizWithData(questions) {
  quizData = questions; currentQuizQ = 0; quizScore = 0;
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  if (currentQuizQ >= quizData.length) { renderQuizResult(); return; }
  quizAnswered = false;
  const q = quizData[currentQuizQ];
  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-box">
      <div class="quiz-progress">${currentQuizQ + 1} / ${quizData.length} мЁҢ ?лЁҜлӢ” ${quizScore}??/div>
      <div class="quiz-q" style="margin-top:10px;">${escHtml(q.q || q.question || '')}</div>
      <div class="quiz-options">
        ${(q.opts || q.options || []).map((opt, i) => `
          <button class="quiz-opt" onclick="selectQuizOpt(${i})">${String.fromCharCode(65+i)}. ${escHtml(opt)}</button>
        `).join('')}
      </div>
      <div id="quizExplain" style="display:none;"></div>
      <div class="quiz-nav">
        <span></span>
        <button class="btn btn-outline btn-sm" id="quizNextBtn" style="display:none;" onclick="nextQuestion()">?г…јм“¬ ??/button>
      </div>
    </div>`;
}

function selectQuizOpt(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizData[currentQuizQ];
  const ans = q.ans !== undefined ? q.ans : q.answer;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((btn, idx) => {
    btn.classList.add('revealed');
    if (idx === ans) btn.classList.add('correct');
    else if (idx === i && i !== ans) btn.classList.add('wrong');
  });
  if (i === ans) quizScore++;
  const explain = document.getElementById('quizExplain');
  explain.style.display = 'block';
  explain.innerHTML = `<div class="quiz-explain">${i === ans ? '???ләЈл–ҹ!' : `???г…»л–ҹ (?ләЈл–ҹ: ${String.fromCharCode(65+ans)})`}<br><br>${escHtml(q.exp || q.explanation || '')}</div>`;
  document.getElementById('quizNextBtn').style.display = 'inline-flex';
}

function nextQuestion() { currentQuizQ++; renderQuizQuestion(); }

function renderQuizResult() {
  const total = quizData.length;
  const pct = Math.round(quizScore / total * 100);
  const emoji = pct >= 80 ? '?лҹҰ' : pct >= 60 ? '?лӘҹ' : '?л®һ';
  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-box quiz-score">
      <div style="font-size:40px;margin-bottom:8px;">${emoji}</div>
      <div class="big">${quizScore} / ${total}</div>
      <div style="font-size:14px;color:var(--text2);margin:8px 0;">${pct}% ?ләЈл–ҹз‘ң?/div>
      <div style="font-size:13px;color:var(--text3);">${pct>=80?'?лҡ®??лҢҒмҠӮ! ??еӘӣм’•лҖ—?ВҖ ???лҢ„л№җ?лҚүлјұ??':pct>=60?'йҶ«л—ӯлёҳ?? иӯ°кіҢнҲ‘ ???кі—л’ҝ?м„ҺгҲғ ?кҫЁкјҚ?лҢҒмҠӮ.':'еӘӣм’•лҖ—?лӘ…л“ғз‘ң??г…јл–Ҷ ?мҺ„нҖ¬ ?кҫ©мҹҫ?лҢҖнӮ„??'}</div>
      <div style="margin-top:20px;display:flex;gap:8px;justify-content:center;">
        <button class="btn btn-primary" onclick="startLocalQuiz()">?лҙҪ ?г…јл–Ҷ ?ВҖж№І?/button>
        <button class="btn btn-outline" onclick="cancelQuiz()">???г…јм ҷ?мҮ°мӨҲ</button>
      </div>
    </div>`;
  _db.ref(FB.quiz_res + '/local_' + Date.now()).set({ score: quizScore, total, pct, date: today() }).catch(()=>{});
}

function cancelQuiz() {
  quizData = null;
  document.getElementById('quizSetup').style.display = 'block';
  document.getElementById('quizArea').style.display = 'none';

// ?ВҖ?ВҖ?ВҖ EXPLAIN ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ?ВҖ
function requestExplain() {
  const query = document.getElementById('explainQuery').value.trim();
  if (!query) { showToast('п§һлҚҲРҰ???лӮ…м °?лҢҒпјң?лӘ„мҠӮ', 'error'); return; }
  const ctx = document.getElementById('explainContext').value.trim();
  const reqId = 'e_' + Date.now();
  pendingExplainId = reqId;
  const resultEl = document.getElementById('explainResult');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `<div class="explain-result"><div class="loading-spin"></div><p style="text-align:center;color:var(--text3);font-size:12px;">п§Қлҡ®лӮ¬?лӢҝ? ?г…»мұё д»ҘВҖйҚ®?д»Ҙ?.. (?кі•гҒҢ ?кҫ©мҠӮ)</p></div>`;
  _db.ref(FB.explain_req + '/' + reqId).set({ query, context: ctx, created: Date.now() });
  _db.ref(FB.explain_res + '/' + reqId).on('value', snap => {
    if (!snap.val() || pendingExplainId !== reqId) return;
    _db.ref(FB.explain_res + '/' + reqId).off('value');
    const r = snap.val();
    if (r.error) { resultEl.innerHTML = `<div class="explain-result" style="border-left:3px solid var(--red);padding-left:12px;"><p style="color:var(--red);">?г…»мӘҹ: ${r.error}</p></div>`; return; }
    resultEl.innerHTML = `<div class="explain-result"><h4>?л®• ${escHtml(query)}</h4><div style="white-space:pre-wrap;font-size:13px;color:var(--text2);line-height:1.8;">${escHtml(r.explanation || r.content || '')}</div></div>`;
    document.getElementById('explainQuery').value = '';
    document.getElementById('explainContext').value = '';
    showToast('?мЁј ?г…»мұё ?кҫЁмҰә!', 'success');
    _db.ref(FB.explain_res + '/hist_' + reqId).set({ query, explanation: r.explanation || r.content, date: today() }).catch(()=>{});
  });
  setTimeout(() => {
    if (pendingExplainId !== reqId) return;
    resultEl.innerHTML = `<div class="explain-result"><p style="color:var(--red);">?к№ҚнҲҳ 30зҸҘ??ВҖ?кҫ©лёҳ?????кі•гҒҢ???кіҢк»җ?м„Ҹ? ?л”ҶлёҜ?лҢҒмҠӮ.<br>desktop_daemon.pyеӘӣВҖ ?г…Ҫл»ҫ д»Ҙл¬’м”Өп§һВҖ ?ләӨм”Ө?лҢҒпјң?лӘ„мҠӮ.</p></div>`;
  }, 30000);
}

    <div class="stat-box"><div class="stat-val">${totalMinutes}</div><div class="stat-label">зҸҘ??мҲҲл’ҝ йҒә?/div></div>

  // Weekly chart
  const last7 = Array.from({length:7}, (_,i) => { const d = new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10); }).reverse();
  const weeklyData = last7.map(d => journals[d]?.duration || 0);
  if (_charts.weekly) _charts.weekly.destroy();
  _charts.weekly = new Chart(document.getElementById('chartWeekly'), {

  const cats = {}; Object.values(discoveries).forEach(day => Object.values(day).forEach(d => { cats[d.category||'ж№Ікі ?'] = (cats[d.category||'ж№Ікі ?']||0)+1; }));
  if (_charts.cat) _charts.cat.destroy();
  _charts.cat = new Chart(document.getElementById('chartCategory'), {
    type: 'doughnut',
    data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#3b82f6','#f59e0b','#8b5cf6','#10b981','#ec4899','#ef4444','#06b6d4','#84cc16','#9ca3af'] }] },
    options: { plugins:{legend:{position:'right',labels:{color:'var(--text)',font:{size:12}}}} }
  });

  const stageData = ROADMAP.map(stage => {

    _db.ref(FB.concepts + '/seed_' + i).set({...c, created: Date.now() - i * 1000, updated: Date.now() - i * 1000}).catch(()=>{});
  });
}
</script>
